version: '3.8'

services:
  bilview:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bilview-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 持久化数据目录
      - ../data:/app/data
      - ../downloads:/app/downloads
      # 挂载环境变量文件
      - ../.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      # 可选：通过环境变量传入 API Keys
      # - GROQ_API_KEY=${GROQ_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # 资源限制（根据你的服务器配置调整）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # 可选：使用 Nginx 作为反向代理
  nginx:
    image: nginx:alpine
    container_name: bilview-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书目录（如果需要 HTTPS）
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - bilview
    # 如果不需要 Nginx，可以注释掉上面整个 nginx 服务

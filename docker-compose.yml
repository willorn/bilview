services:
  bilview:
    build:
      context: .
      dockerfile: Dockerfile
    image: bilview:latest
    container_name: bilview
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      BILVIEW_STORAGE_DIR: /data
    volumes:
      - bilview_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  bilview_data:
